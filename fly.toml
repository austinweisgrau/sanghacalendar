# Fly.io config — Phase 2 (when serving layer goes live)
#
# Setup:
#   fly launch --no-deploy   (imports this file)
#   fly volumes create sangha_data --size 1 --region sjc
#   fly secrets set DB_PATH=/data/sangha.db
#   fly deploy
#
# Daily ingestion (run from GitHub Actions or manually):
#   flyctl ssh console -a sangha-calendar -C "python -m ingestion.coordinator"

app            = "sangha-calendar"
primary_region = "sjc"  # San Jose — closest to Bay Area

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0    # scales to zero when idle = ~$0 for low-traffic

[[mounts]]
  source      = "sangha_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
