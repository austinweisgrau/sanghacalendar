# Fly.io config
#
# First-time setup:
#   fly launch --no-deploy
#   fly volumes create sangha_data --size 1 --region sjc
#   fly secrets set DB_PATH=/data/sangha.db
#   fly deploy
#
# Manual ingestion run:
#   flyctl ssh console -a sangha-calendar -C "python -m ingestion.coordinator"

app            = "sangha-calendar"
primary_region = "sjc"  # San Jose — closest to Bay Area

[build]

[env]
  PORT    = "8080"
  DB_PATH = "/data/sangha.db"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1    # keep one warm — ~$2/mo, required for SSH ingestion trigger

[[mounts]]
  source      = "sangha_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
